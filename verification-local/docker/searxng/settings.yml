use_default_settings: true

general:
  debug: false
  instance_name: supercharged-local-audit

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "change-this-for-local-audit"

search:
  safe_search: 0
  formats:
    - html
    - json

redis:
  url: redis://redis:6379/0

outgoing:
  request_timeout: 6.0

engines:
  - name: duckduckgo
    disabled: false
  - name: brave
    disabled: false
  - name: bing
    disabled: false
  - name: wikipedia
    disabled: true
  - name: wikidata
    disabled: true
  - name: qwant
    disabled: true
