const KEYWORD_COLOURS_FIXED = {
  "AI founder": { bg: "#E6F1FB", fg: "#185FA5" },

  "ex-Oxford": { bg: "#EEEDFE", fg: "#3C3489" },

  "causal inference": { bg: "#FAECE7", fg: "#712B13" },
  researchers: { bg: "#E1F5EE", fg: "#085041" },
};
// Rotation pool for unknown keywords — reuses the same palette in order.
const KEYWORD_COLOUR_POOL = Object.values(KEYWORD_COLOURS_FIXED);
const keywordColourCache = {};
function getKeywordColour(kw) {
  if (KEYWORD_COLOURS_FIXED[kw]) return KEYWORD_COLOURS_FIXED[kw];
  if (keywordColourCache[kw]) return keywordColourCache[kw];
  const idx = Object.keys(keywordColourCache).length % KEYWORD_COLOUR_POOL.length;
  keywordColourCache[kw] = KEYWORD_COLOUR_POOL[idx];
  return keywordColourCache[kw];
}

function SuperchargedSearchFlow() {
  const [screen, setScreen] = useState("dashboard"); // dashboard | search | results | profile | chat | connection_sent
  const [query, setQuery] = useState("");
  const [activeChip, setActiveChip] = useState(null);
  const [selectedPerson, setSelectedPerson] = useState(null);
  const [chatPerson, setChatPerson] = useState(null);
  const [connectedPerson, setConnectedPerson] = useState(null);
  const [searchScope, setSearchScope] = useState("app"); // app | web
  const [loading, setLoading] = useState(false);
  const [dashboardExiting, setDashboardExiting] = useState(false);
  const [searchPulse, setSearchPulse] = useState(false);
  const inputRef = useRef(null);

  // Font loading
  useEffect(() => {
    const id = "sc-fonts";
    if (document.getElementById(id)) return;
    const link = document.createElement("link");
    link.id = id;
    link.rel = "stylesheet";
    link.href =
      "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@400;500;600;700&display=swap";
    document.head.appendChild(link);
  }, []);

  // Focus the search input when entering the search screen
  useEffect(() => {
    if (screen === "search") {
      const t = setTimeout(() => inputRef.current?.focus(), 350);
      return () => clearTimeout(t);
    }
  }, [screen]);

  const openSearch = () => {
    setSearchPulse(true);
    setDashboardExiting(true);
    setTimeout(() => setSearchPulse(false), 200);
    setTimeout(() => {
      setScreen("search");
      setDashboardExiting(false);
    }, 280);
  };

  const closeSearch = () => {
    setScreen("dashboard");
    setQuery("");
    setActiveChip(null);
  };

  const runSearch = (text) => {
    setQuery(text);
    setActiveChip(text);
    setLoading(true);
    setScreen("results");
    setTimeout(() => setLoading(false), 650);
  };

  const clearResults = () => {
    setQuery("");
    setActiveChip(null);
    setScreen("search");
  };

  const openProfile = (person) => {
    setSelectedPerson(person);
    setScreen("profile");
  };

  const backFromProfile = () => {
    setScreen("results");
  };

  const openChat = (person) => {
    setChatPerson(person);
    setScreen("chat");
  };

  const backFromChat = () => {
    setScreen("results");
  };

  const openConnectionSent = (person) => {
    setConnectedPerson(person);
    setScreen("connection_sent");
  };

  const backToList = () => {
    setScreen("results");
    setConnectedPerson(null);
  };

  return (
    <div
      style={{
        minHeight: "100vh",
        background:
          "radial-gradient(circle at 20% 10%, #f0ece3 0%, #e8e3d6 40%, #ddd6c4 100%)",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        padding: "32px 16px",
        fontFamily: "'DM Sans', -apple-system, sans-serif",
      }}
    >
      <style>{keyframes}</style>

      <div
        style={{
          width: 390,
          height: 844,
          background: COLORS.paper,
          borderRadius: 44,
          overflow: "hidden",
          position: "relative",
          boxShadow:
            "0 40px 80px rgba(30,20,10,0.25), 0 0 0 10px #1a1a1a, 0 0 0 11px #333",
          fontFamily: "'DM Sans', sans-serif",
          color: COLORS.ink,
        }}
      >
        {/* Status bar — always rendered */}
        <StatusBar />

        {/* Dashboard */}
        {screen === "dashboard" && (
          <DashboardScreen
            onSearch={openSearch}
            exiting={dashboardExiting}
            searchPulse={searchPulse}
          />
        )}

        {/* Search */}
        {screen === "search" && (
          <SearchScreen
            onBack={closeSearch}
            onSubmit={runSearch}
            query={query}
            setQuery={setQuery}
            inputRef={inputRef}
            searchScope={searchScope}
            setSearchScope={setSearchScope}
          />
        )}

        {/* Results */}
        {screen === "results" && (
          <ResultsScreen
            query={query}
            activeChip={activeChip}
            loading={loading}
            onClear={clearResults}
            onOpenProfile={openProfile}
            onConnect={openChat}
            onBack={() => setScreen("search")}
          />
        )}

        {/* Profile */}
        {screen === "profile" && selectedPerson && (
          <ProfileScreen
            person={selectedPerson}
            onBack={backFromProfile}
            onConnect={openChat}
          />
        )}

        {/* Chat */}
        {screen === "chat" && chatPerson && (
          <ChatScreen
            person={chatPerson}
            onBack={backFromChat}
            onSend={() => openConnectionSent(chatPerson)}
          />
        )}

        {/* Connection sent */}
        {screen === "connection_sent" && connectedPerson && (
          <ConnectionSentScreen
            person={connectedPerson}
            onBackToList={backToList}
          />
        )}
      </div>
    </div>
  );
}

function SearchScreen({ onBack, onSubmit, query, setQuery, inputRef, searchScope, setSearchScope }) {
  const [selectedChips, setSelectedChips] = useState([]);

  const toggleChip = (chip) => {
    setSelectedChips((prev) => {
      const next = prev.includes(chip) ? prev.filter((c) => c !== chip) : [...prev, chip];
      setQuery(next.join(", "));
      // Reset textarea height since the input is controlled
      requestAnimationFrame(() => {
        const el = inputRef.current;
        if (el) {
          el.style.height = "auto";
          el.style.height = el.scrollHeight + "px";
        }
      });
      return next;
    });
  };

  return (
    <div
      style={{
        position: "absolute",
        top: 54,
        left: 0,
        right: 0,
        bottom: 0,
        background: COLORS.paper,
        animation: "sc-circle-in 280ms ease-in-out forwards",

          padding: 0,
          marginBottom: 18,
          fontSize: 14,

          color: COLORS.ink,
          cursor: "pointer",

          alignItems: "center",
          gap: 4,
          animation: "sc-fade-slide-in 220ms ease-out 100ms both",

      >
        <span style={{ fontSize: 18, lineHeight: 1 }}>‹</span> Back
      </button>

      {/* Search bar */}
      <div
        style={{
          display: "flex",
          alignItems: "flex-start",
          gap: 10,
          background: COLORS.paper,
          border: `1.5px solid ${COLORS.ink}`,

function ProfileScreen({ person, onBack, onConnect }) {
  const [ringPct, setRingPct] = useState(0);
  const [displayedPct, setDisplayedPct] = useState(0);

  // Ring animation
  useEffect(() => {
    const t = setTimeout(() => setRingPct(person.match), 100);
    return () => clearTimeout(t);
  }, [person.match]);

  // Count-up
  useEffect(() => {
    const start = performance.now();
    const duration = 800;
    let raf;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplayedPct(Math.round(eased * person.match));
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    const delay = setTimeout(() => {
      raf = requestAnimationFrame(tick);
    }, 100);
    return () => {
      clearTimeout(delay);
      if (raf) cancelAnimationFrame(raf);
    };
  }, [person.match]);

  const ringR = 44;
  const ringC = 2 * Math.PI * ringR;
  const dashOffset = ringC - (ringC * ringPct) / 100;

  return (
    <div
      style={{
        position: "absolute",
        top: 54,
        left: 0,
        right: 0,
        bottom: 0,
        background: COLORS.paper,

        <div style={{ textAlign: "center", minWidth: 0 }}>
          <div style={{ fontSize: 17, fontWeight: 600 }}>{person.name}</div>

      {/* Match ring */}

            <circle

              r={ringR}
              stroke={person.ring.color}
              strokeWidth="7"

              strokeDasharray={ringC}

            flexShrink: 0,
          }}
        >
          {person.initials}
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 15, fontWeight: 600, lineHeight: 1.2 }}>
            {person.name}
          </div>
          <div
            style={{
              fontSize: 12,
              color: COLORS.inkMuted,
              lineHeight: 1.3,
              overflow: "hidden",
              textOverflow: "ellipsis",
              whiteSpace: "nowrap",
            }}
          >
            {person.role}
          </div>
        </div>
        <button
          aria-label="Menu"
          style={{
            display: "inline-flex",
            alignItems: "center",
            gap: 4,
            padding: "6px 10px",
            border: "1px solid rgba(0,0,0,0.15)",
            borderRadius: 999,
            background: "transparent",
            color: COLORS.ink,
            fontSize: 13,
            fontFamily: "inherit",
            cursor: "pointer",
            flexShrink: 0,
          }}
        >
          <span style={{ fontSize: 14, lineHeight: 1 }}>—</span>
          <span style={{ fontSize: 13, lineHeight: 1 }}>›</span>
        </button>
      </div>

      {/* Progress track */}
      <div style={{ padding: "14px 20px 10px" }}>
        <div
          style={{
            display: "flex",
            alignItems: "center",
            gap: 6,
            marginBottom: 8,
          }}
        >
          {PROGRESS_STAGES.map((_, i) => (
            <div
              key={i}
              style={{
                flex: 1,
                height: 3,
                borderRadius: 999,
                background: i === 0 ? COLORS.ink : "#e6e4de",
              }}
            />
          ))}
        </div>
        <div
          style={{
            display: "flex",
            justifyContent: "space-between",
            fontSize: 10.5,
            fontWeight: 500,
            letterSpacing: "0.04em",
            color: COLORS.inkMuted,
            textTransform: "uppercase",
          }}
        >
          <span style={{ color: COLORS.ink }}>{PROGRESS_STAGES[0]}</span>
          <span>{PROGRESS_STAGES[PROGRESS_STAGES.length - 1]}</span>
        </div>
      </div>

      {/* Context chips — horizontal scroll */}
      <div
        style={{
          display: "flex",
          gap: 6,
          overflowX: "auto",
          padding: "4px 16px 14px",
          scrollbarWidth: "none",
        }}
        className="sc-no-scrollbar"
      >
        {CHAT_CONTEXT_CHIPS.map((chip) => (
          <span
            key={chip}
            style={{
              border: "1px solid rgba(0,0,0,0.12)",
              background: "transparent",
              color: COLORS.ink,
              fontSize: 11,
              fontWeight: 500,
              padding: "5px 11px",
              borderRadius: 999,
              whiteSpace: "nowrap",
              flexShrink: 0,
            }}
          >
            {chip}
          </span>
        ))}
      </div>

      {/* Message thread */}
      <div
        style={{
          flex: 1,
          padding: "12px 16px 0",
          overflowY: "auto",
          display: "flex",
          flexDirection: "column",
          gap: 12,
        }}
      >
        <div
          style={{
            alignSelf: "center",
            fontSize: 11,
            color: COLORS.inkMuted,
            letterSpacing: "0.03em",
          }}
        >
          Earlier today
        </div>

        {/* Received message */}
        <div style={{ display: "flex", alignItems: "flex-end", gap: 8, maxWidth: "85%" }}>
          <div
            style={{
              width: 28,
              height: 28,
              borderRadius: "50%",
              background: p.bg,
              color: p.fg,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              fontSize: 10,
              fontWeight: 600,
              flexShrink: 0,
            }}
          >
            {person.initials}
          </div>
          <div
            style={{
              background: "#f0ede8",
              borderRadius: "18px 18px 18px 4px",
              padding: "10px 14px",
              fontSize: 14.5,
              lineHeight: 1.45,
              color: COLORS.ink,
            }}
          >
            {firstMessage}
          </div>
        </div>

        <div
          style={{
            alignSelf: "center",
            fontSize: 11,
            fontStyle: "italic",
            color: COLORS.inkMuted,
            marginTop: 4,
          }}
        >
          Conversation accepted · Just now
        </div>
      </div>

      {/* Bottom action area */}
      <div
        style={{
          borderTop: "0.5px solid rgba(0,0,0,0.08)",
          padding: "10px 12px 14px",
          background: COLORS.paper,
        }}
      >
        {/* Suggested actions row */}
        <div
          style={{
            display: "flex",
            gap: 6,
            overflowX: "auto",
            paddingBottom: 8,
            scrollbarWidth: "none",
          }}
          className="sc-no-scrollbar"
        >
          {SUGGESTED_ACTIONS.map((action, i) => {
            const isAmber = action.tone === "amber";
            return (
              <button
                key={i}
                onClick={onSend}
                style={{
                  display: "inline-flex",
                  alignItems: "center",
                  gap: 5,
                  background: isAmber ? "#F5A623" : "transparent",
                  border: isAmber
                    ? "1px solid #F5A623"
                    : "1px solid rgba(0,0,0,0.15)",
                  color: isAmber ? "#fff" : COLORS.ink,
                  fontSize: 12.5,
                  fontWeight: 500,
                  fontFamily: "inherit",
                  padding: "7px 12px",
                  borderRadius: 999,
                  whiteSpace: "nowrap",
                  flexShrink: 0,
                  cursor: "pointer",
                }}
              >
                {action.icon && (
                  <span style={{ fontSize: 12, lineHeight: 1 }}>{action.icon}</span>
                )}
                {action.label}
              </button>
            );
          })}
        </div>

        {/* Reply bar */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 2 }}>
          <button
            aria-label="AI compose"
            style={{
              width: 38,
              height: 38,
              borderRadius: "50%",
              border: "1px solid rgba(0,0,0,0.15)",
              background: "transparent",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              cursor: "pointer",
              flexShrink: 0,
              fontSize: 15,
              color: COLORS.ink,
            }}
          >
            ⚡
          </button>
          <div
            style={{
              flex: 1,
              display: "flex",
              alignItems: "center",
              gap: 10,
              background: COLORS.warmGrey,
              border: "1px solid rgba(0,0,0,0.08)",
              borderRadius: 999,
              padding: "9px 14px",
            }}
          >
            <input
              placeholder="Reply..."
              onKeyDown={(e) => {
                if (e.key === "Enter" && e.currentTarget.value.trim()) {
                  e.preventDefault();
                  onSend();
                }
              }}
              style={{
                flex: 1,
                border: "none",
                background: "transparent",
                outline: "none",
                fontSize: 14,
                fontFamily: "inherit",
                color: COLORS.ink,
                minWidth: 0,
              }}
            />
            <div
              style={{
                display: "flex",
                alignItems: "center",
                gap: 10,
                color: COLORS.inkMuted,
                flexShrink: 0,
              }}
            >
              {/* mic */}
              <svg width="16" height="16" viewBox="0 0 20 20" fill="none" aria-label="Voice">
                <rect
                  x="7"
                  y="2"
                  width="6"
                  height="10"
                  rx="3"
                  stroke={COLORS.inkMuted}
                  strokeWidth="1.4"
                  fill="none"
                />
                <path
                  d="M4 10 C4 13.3 6.7 16 10 16 C13.3 16 16 13.3 16 10"
                  stroke={COLORS.inkMuted}
                  strokeWidth="1.4"
                  strokeLinecap="round"
                  fill="none"
                />
                <path d="M10 16 L10 18" stroke={COLORS.inkMuted} strokeWidth="1.4" strokeLinecap="round" />
              </svg>
              {/* image */}
              <svg width="16" height="16" viewBox="0 0 20 20" fill="none" aria-label="Image">
                <rect
                  x="2"
                  y="3.5"
                  width="16"
                  height="13"
                  rx="2"
                  stroke={COLORS.inkMuted}
                  strokeWidth="1.4"
                  fill="none"
                />
                <circle cx="7" cy="8" r="1.4" fill={COLORS.inkMuted} />
                <path d="M3 14 L8 10 L12 13 L17 9" stroke={COLORS.inkMuted} strokeWidth="1.4" fill="none" strokeLinejoin="round" />
              </svg>
              {/* plus */}
              <svg width="16" height="16" viewBox="0 0 20 20" fill="none" aria-label="More">
                <path d="M10 4 L10 16 M4 10 L16 10" stroke={COLORS.inkMuted} strokeWidth="1.6" strokeLinecap="round" />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Connection sent screen
// ---------------------------------------------------------------------------

function ConnectionSentScreen({ person, onBackToList }) {
  const firstName = person.name.split(" ")[0];
  return (
    <div
      style={{
        position: "absolute",
        top: 54,
        left: 0,
        right: 0,
        bottom: 0,
        background: COLORS.paper,
        animation: "sc-fade-in 250ms ease-out both",
        display: "flex",
        flexDirection: "column",
      }}
    >
      {/* Top gradient zone */}
      <div
        style={{
          height: "45%",
          background: person.gradient || "linear-gradient(160deg, #8B7FE8 0%, #5B4FCF 100%)",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          position: "relative",
          overflow: "hidden",
        }}
      >
        <div
          style={{
            fontFamily: "'Cormorant Garamond', serif",
            fontSize: 180,
            fontWeight: 500,
            letterSpacing: "-0.02em",
            color: "rgba(255,255,255,0.25)",
            lineHeight: 1,
            userSelect: "none",
          }}
        >
          {person.initials}
        </div>
      </div>

      {/* White card */}
      <div
        style={{
          flex: 1,
          background: COLORS.paper,
          borderRadius: "28px 28px 0 0",
          marginTop: -20,
          padding: "36px 24px 28px",
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          position: "relative",
          animation: "sc-fade-up 400ms ease-out 100ms both",
        }}
      >
        <h1
          style={{
            fontFamily: "'Cormorant Garamond', serif",
            fontSize: 28,
            fontWeight: 500,
            color: COLORS.ink,
            margin: 0,
            marginBottom: 12,
            textAlign: "center",
            letterSpacing: "-0.01em",
          }}
        >
          Connection sent
        </h1>
        <p
          style={{
            fontSize: 14,
            color: COLORS.ink,
            margin: 0,
            marginBottom: 36,
            textAlign: "center",
            maxWidth: 260,
            lineHeight: 1.6,
          }}
        >
          {firstName} will be notified. Once they accept, you can message each other.
        </p>

        <div style={{ width: "100%", marginTop: "auto" }}>
          <button
            onClick={onBackToList}
            style={{
              width: "100%",
              height: 52,
              background: COLORS.ink,
              color: COLORS.paper,
              border: "none",
              borderRadius: 999,
              padding: "0 20px",
              fontSize: 15,
              fontWeight: 500,
              fontFamily: "inherit",
              cursor: "pointer",
            }}
          >
            Back to list
          </button>
        </div>
      </div>
    </div>
  );
}

function Section({ label, rightLabel, children, delay }) {
  return (
    <div
      style={{
        padding: "20px 24px 0",
        animation: `sc-fade-up 400ms ease-out ${delay}ms both`,
      }}
    >
      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          alignItems: "baseline",
          marginBottom: 10,
        }}
      >
        <span
          style={{
            fontSize: 11,
            fontWeight: 500,
            letterSpacing: "0.07em",
            color: COLORS.inkMuted,
            textTransform: "uppercase",
          }}
        >
          {label}
        </span>
        {rightLabel && (
          <span
            style={{
              fontSize: 11,
              fontWeight: 500,
              color: COLORS.inkFaint,
              textTransform: "uppercase",
              letterSpacing: "0.07em",
            }}
          >
            {rightLabel}
          </span>
        )}
      </div>
      {children}
    </div>
  );
}

function DimensionBar({ dim, delay }) {
  const [w, setW] = useState(0);
  useEffect(() => {
    const t = setTimeout(() => setW(dim.score), delay);
    return () => clearTimeout(t);
  }, [dim.score, delay]);

  return (
    <div>
      <div
        style={{
          display: "flex",
          alignItems: "baseline",
          justifyContent: "space-between",
          marginBottom: 6,
        }}
      >
        <div style={{ fontSize: 13 }}>
          <span style={{ fontWeight: 600 }}>{dim.name}</span>
          <span style={{ color: COLORS.inkMuted, marginLeft: 6 }}>· {dim.desc}</span>
        </div>
        <div
          style={{
            fontFamily: "'Cormorant Garamond', serif",
            fontStyle: "italic",
            fontSize: 20,
            fontWeight: 500,
            color: dim.color,
          }}
        >
          {dim.score}
        </div>
      </div>
      <div
        style={{
          height: 4,
          background: COLORS.warmGrey,
          borderRadius: 999,
          overflow: "hidden",
        }}
      >
        <div
          style={{
            height: "100%",
            width: `${w}%`,
            background: dim.color,
            borderRadius: 999,
            transition: "width 600ms cubic-bezier(0.22, 1, 0.36, 1)",
          }}
        />
      </div>
    </div>
  );
}

const keyframes = `
  @keyframes sc-circle-in {
    from { clip-path: circle(0% at calc(100% - 40px) 0%); }
    to { clip-path: circle(150% at calc(100% - 40px) 0%); }
  }
  @keyframes sc-fade-slide-in {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes sc-fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes sc-blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  @keyframes sc-pulse-in {
    0% { opacity: 0; transform: scale(0.9); }
    60% { opacity: 1; transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  @keyframes sc-shimmer {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
  @keyframes sc-card-in {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes sc-push-in {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }
  @keyframes sc-fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .sc-no-scrollbar::-webkit-scrollbar { display: none; }
`;
